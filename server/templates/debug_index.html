<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Arkhe Debug — Jobs</title>
  <link rel="stylesheet" href="/static/arkhe.css">
  <style>
    body { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; font-family: monospace; }
    h1 { color: var(--accent); margin-bottom: 1.5rem; }
    .job-row { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem;
               background: var(--surface); border-radius: 8px; margin-bottom: 0.5rem; }
    .job-id { font-weight: 700; color: var(--accent-hi); min-width: 90px; }
    .job-url { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-2); font-size: 0.85rem; }
    .job-status { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px;
                  background: var(--surface-hi); color: var(--text-3); }
    .job-status.complete { background: rgba(34,197,94,0.15); color: #4ade80; }
    .job-status.error    { background: rgba(239,68,68,0.15);  color: #f87171; }
    .job-status.running  { background: rgba(99,102,241,0.15); color: var(--accent-hi); }
    a { color: var(--accent-hi); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .empty { color: var(--text-3); padding: 2rem 0; }
  </style>
</head>
<body>
  <h1>Debug — All Jobs</h1>
  {% if jobs %}
    {% for j in jobs %}
    <div class="job-row">
      <span class="job-id"><a href="/debug/{{ j.job_id }}">{{ j.job_id }}</a></span>
      <span class="job-url">{{ j.url or "(no url)" }}</span>
      <span class="job-status {{ j.status }}">{{ j.status }}</span>
    </div>
    {% endfor %}
  {% else %}
    <p class="empty">No jobs found on disk.</p>
  {% endif %}
</body>
</html>
