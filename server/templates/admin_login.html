<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arkhe — Developer Access</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/arkhe.css" />
  <style>
    .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
    .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem 2.25rem; width:100%; max-width:380px; box-shadow:0 8px 40px rgba(0,0,0,0.3); }
    .auth-logo { font-size:1.5rem; font-weight:800; letter-spacing:-0.5px; color:var(--text); text-align:center; margin-bottom:0.3rem; }
    .auth-logo span { color:var(--accent); }
    .auth-subtitle { text-align:center; color:var(--text-2); font-size:0.88rem; margin-bottom:2rem; }
    .auth-label { font-size:0.8rem; font-weight:500; color:var(--text-2); margin-bottom:0.4rem; display:block; }
    .auth-input { width:100%; padding:0.65rem 0.9rem; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:0.9rem; margin-bottom:1rem; outline:none; transition:border-color 0.15s; box-sizing:border-box; }
    .auth-input:focus { border-color:var(--accent); }
    .auth-btn { width:100%; padding:0.7rem; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; transition:filter 0.15s,opacity 0.15s; }
    .auth-btn:hover { filter:brightness(1.1); }
    .auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .auth-error { color:#f87171; font-size:0.82rem; text-align:center; margin-top:0.75rem; display:none; }
    .auth-error.visible { display:block; }
    .auth-footer { text-align:center; font-size:0.82rem; color:var(--text-2); margin-top:1.5rem; }
    .auth-footer a { color:var(--accent-hi); text-decoration:none; }
    .back-link { display:block; text-align:center; font-size:0.82rem; color:var(--text-2); margin-bottom:1.5rem; text-decoration:none; }
    .back-link:hover { color:var(--text); }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <a href="/" class="back-link">← Back</a>
      <div class="auth-logo">Arkhe<span>.</span></div>
      <div class="auth-subtitle">Developer access</div>

      <label class="auth-label" for="password">Developer Password</label>
      <input class="auth-input" type="password" id="password" placeholder="Enter password" />
      <button class="auth-btn" id="submit-btn" onclick="submitAdmin()">Enter</button>
      <div class="auth-error" id="error-msg">{% if error %}{{ error }}{% endif %}</div>

      <div class="auth-footer"><a href="/login">User login →</a></div>
    </div>
  </div>
  <script>
    const savedTheme = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", savedTheme);
    document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") submitAdmin(); });
    {% if error %}document.getElementById("error-msg").classList.add("visible");{% endif %}
    async function submitAdmin() {
      const password = document.getElementById("password").value;
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      err.classList.remove("visible");
      btn.disabled = true; btn.textContent = "Entering…";
      try {
        const res = await fetch("/admin/login", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({password}),
        });
        if (res.ok) {
          window.location.href = "/admin";
        } else {
          const data = await res.json();
          err.textContent = data.error || "Incorrect password.";
          err.classList.add("visible");
          btn.disabled = false; btn.textContent = "Enter";
        }
      } catch {
        err.textContent = "Network error.";
        err.classList.add("visible");
        btn.disabled = false; btn.textContent = "Enter";
      }
    }
  </script>
</body>
</html>
